services:
  mysql:
    image: mysql
    container_name: mysql-springstudent
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "3306:3306"
    volumes:
      - ./hb-01-one-to-one-uni:/docker-entrypoint-initdb.d
      - ./mysql-data:/var/lib/mysql
      - ./logs:/var/log/mysql
    restart: on-failure
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

volumes:
  mysql-data:
